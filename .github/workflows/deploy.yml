name: Deploy Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          WALLET_KEY_PASSPHRASE: ${{ secrets.WALLET_KEY_PASSPHRASE }}
          GMO_API_KEY: ${{ secrets.GMO_API_KEY }}
          GMO_API_SECRET: ${{ secrets.GMO_API_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: WALLET_KEY_PASSPHRASE,GMO_API_KEY,GMO_API_SECRET,SLACK_WEBHOOK_URL
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/crypto_trade_bot
            git fetch --all --prune
            git checkout main
            git pull origin main
            docker compose up -d --build
            docker compose -f docker-compose.gmo.yml up -d --build
            docker compose ps
            docker compose -f docker-compose.gmo.yml ps

# Required repository secrets:
# - VPS_HOST
# - VPS_USER
# - VPS_SSH_KEY
# - WALLET_KEY_PASSPHRASE
# - GMO_API_KEY
# - GMO_API_SECRET
# - SLACK_WEBHOOK_URL (optional)
